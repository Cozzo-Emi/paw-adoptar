services:
  db:
    image: postgres:16-alpine
    container_name: paw_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paw_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paw_secret_dev}
      POSTGRES_DB: ${POSTGRES_DB:-paw_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paw_user} -d ${POSTGRES_DB:-paw_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paw_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
