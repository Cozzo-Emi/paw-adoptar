name: Backend CI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main", "dev" ]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paw_test
          POSTGRES_PASSWORD: paw_test_password
          POSTGRES_DB: paw_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest-cov black
        
    - name: Lint with Flake8 & Black
      run: |
        black --check app/
        # stop the build if there are Python syntax errors or undefined names
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
        
    - name: Test with pytest
      env:
        DATABASE_URL: postgresql+asyncpg://paw_test:paw_test_password@localhost:5432/paw_test_db
        APP_ENV: testing
      run: |
        pytest --cov=app --cov-report=xml
